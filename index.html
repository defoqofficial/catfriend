<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Cat Friend</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="screen-dimmer"></div>
  <div id="light-container" style="display: none;">
    <div id="swinging-light">
      <div id="light-bulb-tracker" style="position: absolute; bottom: -20px; left: -10px; width: 22px; height: 22px; pointer-events: none;"></div>
    </div>
  </div>
  <div id="nature-environment"></div>
  <div id="bug-fly"></div>
  <div id="cats-layer"></div>
  
  <div id="menu-overlay"></div>
  
  <div id="cat-context-menu">
    <div class="menu-item" id="menu-friend">Friend Mode</div>
    <div class="menu-item" id="menu-twin">Twin Mode</div>
    <div class="menu-item" id="menu-gift">Bring Gift</div>
    <div class="menu-item" id="menu-force-eye">Force Eye Rest</div>
    <div class="menu-item" id="menu-force-short">Force Short Break</div>
    <div class="menu-item" id="menu-force-long">Force Long Break</div>
    <div class="menu-item" id="menu-customize-break">Customize Long Break</div>
    <div class="menu-item" id="btn-reload-app" style="color: #ff6b6b;">Reload App</div>
    <div style="border-bottom: 2px dashed black; margin: 4px 0;"></div>
    <div class="menu-item" id="menu-sit">Sit</div>
    <div class="menu-item" id="menu-sleep">Sleep</div>
    <div class="menu-item" id="menu-quit">Quit</div>
    <div style="border-bottom: 2px dashed black; margin: 4px 0;"></div>
    <div class="menu-item" id="menu-timer-eye" style="pointer-events: none; opacity: 0.7; font-size: 14px; padding: 2px 8px;">Eye Rest: --</div>
    <div class="menu-item" id="menu-timer-short" style="pointer-events: none; opacity: 0.7; font-size: 14px; padding: 2px 8px;">Short Break: --</div>
    <div class="menu-item" id="menu-timer-long" style="pointer-events: none; opacity: 0.7; font-size: 14px; padding: 2px 8px;">Long Break: --</div>
  </div>
  <div id="cursor-warning"></div>
  <div id="save-break-btn" style="display: none;">Save & Exit Customization</div>

  <script src="renderer.js"></script>
</body>
</html>
